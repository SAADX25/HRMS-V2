<header class="navbar">
  <div class="navbar-left">
    <button class="menu-btn" (click)="onToggle()" aria-label="Toggle Sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="navbar-right">
    <div class="user-info">
      <div class="avatar">
        {{ authService.currentUser()?.username?.charAt(0) | uppercase }}
      </div>
      <div class="details">
        <span class="name">{{ authService.currentUser()?.username }}</span>
        <span class="role">{{ authService.currentUser()?.role }}</span>
      </div>
    </div>
    
    <button class="logout-btn" (click)="onLogout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </button>
  </div>
</header>
